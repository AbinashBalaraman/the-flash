[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false
  host = "127.0.0.1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# v1 Stability Pattern (Named functions handle routing)

[build.environment]
  NVIDIA_BASE_URL = "https://integrate.api.nvidia.com/v1"
